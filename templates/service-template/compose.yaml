services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      APP_ENV: local
      PORT: 3000
      DATABASE_URL: postgres://appuser:password@db:5432/appdb
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
    volumes:
      - app_postgres_data:/var/lib/postgresql/data

volumes:
  app_postgres_data: